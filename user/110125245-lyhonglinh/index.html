<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang Chủ - Lý Hồng Linh</title>
    <style>
        body {
            background-image: url('img/blackground.jpg'); /* Thay bằng tên file ảnh của bạn */
            background-size: 100% 100% ;
            background-attachment: fixed;
            background-repeat: no-repeat;
            background-position: center;
        }

        .home-card {
            background: rgba(255, 255, 255, 0.1);
            padding: 50px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.2);
        }

        h1 { font-size: 3rem; margin-bottom: 10px; }
        p { font-size: 1.2rem; margin-bottom: 30px; opacity: 0.9; }

        .btn-go {
            background-color: #ffffff;
            color: #6c5ce7;
            padding: 15px 35px;
            text-decoration: none;
            font-weight: bold;
            border-radius: 50px;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            display: inline-block;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .btn-go:hover {
            background-color: #6c5ce7;
            color: white;
            transform: translateY(-5px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

    <div class="home-card">
        <h1>Chào mừng bạn! 👋</h1>
        <p>Tôi là Lý Hồng Linh - Sinh viên lớp DA25TTA</p>
        
        <a href="ttcn.html" class="btn-go">Khám phá Profile của tôi ➔</a>
    </div>

</body>
</html>
